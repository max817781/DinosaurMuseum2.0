<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YanYan 歌聲收藏冊｜恐龍諾諾博物館</title>
    <style>
        :root {
            --cream: #fff8e8;
            --cream-deep: #f4ead2;
            --paper: #fffdf7;
            --green: #789260;
            --green-soft: #dce9bd;
            --green-pale: #eef6d6;
            --purple: #5a4e73;
            --purple-soft: #e8dff3;
            --pink: #ec7aa2;
            --yellow: #f5d77b;
            --brown: #6f624d;
            --line: #ded0b3;
            --shadow: 0 18px 45px rgba(96, 76, 45, 0.14);
            --radius-lg: 28px;
            --radius-md: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
            color: var(--brown);
            background:
                radial-gradient(circle at top left, rgba(220, 233, 189, 0.75), transparent 32%),
                radial-gradient(circle at top right, rgba(232, 223, 243, 0.7), transparent 30%),
                linear-gradient(180deg, #fff9e9 0%, #f8efd9 100%);
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font: inherit;
        }

        .songbook-page {
            width: min(1180px, calc(100% - 36px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            width: 58px;
            height: 58px;
            object-fit: contain;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 10px 25px rgba(104, 88, 51, 0.12);
        }

        .brand-title {
            margin: 0;
            color: var(--purple);
            font-size: clamp(1.35rem, 3vw, 2rem);
            line-height: 1.15;
        }

        .brand-subtitle {
            display: block;
            margin-top: 4px;
            color: var(--green);
            font-size: 0.94rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid rgba(120, 146, 96, 0.32);
            background: rgba(255, 253, 247, 0.82);
            color: var(--green);
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(94, 80, 48, 0.1);
            transition: transform 0.2s ease, background 0.2s ease;
            white-space: nowrap;
        }

        .home-link:hover {
            transform: translateY(-2px);
            background: #ffffff;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 24px;
            align-items: stretch;
            margin-bottom: 28px;
        }

        .hero-copy,
        .hero-card,
        .songbook-panel {
            border: 1px solid rgba(222, 208, 179, 0.72);
            background: rgba(255, 253, 247, 0.84);
            box-shadow: var(--shadow);
            border-radius: var(--radius-lg);
        }

        .hero-copy {
            padding: clamp(24px, 5vw, 44px);
            position: relative;
            overflow: hidden;
        }

        .hero-copy::after {
            content: "♪";
            position: absolute;
            right: 34px;
            bottom: 12px;
            color: rgba(120, 146, 96, 0.16);
            font-size: 8rem;
            font-weight: 900;
            transform: rotate(-12deg);
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--green);
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .hero h2 {
            margin: 12px 0 14px;
            color: var(--purple);
            font-size: clamp(2rem, 6vw, 4.3rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        .hero p {
            max-width: 680px;
            margin: 0;
            color: #756b5a;
            line-height: 1.9;
            font-size: 1.02rem;
        }

        .hero-card {
            padding: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
            min-height: 250px;
            background:
                linear-gradient(145deg, rgba(220, 233, 189, 0.66), rgba(255, 253, 247, 0.86)),
                rgba(255, 253, 247, 0.9);
        }

        .hero-card .count {
            color: var(--purple);
            font-size: clamp(2.5rem, 7vw, 5rem);
            line-height: 0.95;
            font-weight: 900;
        }

        .hero-card span {
            color: var(--green);
            font-weight: 900;
        }

        .songbook-panel {
            padding: 22px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            border: 0;
            cursor: pointer;
            border-radius: 999px;
            padding: 10px 18px;
            color: #5f574a;
            background: #ebe2cf;
            font-weight: 900;
            transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
        }

        .filter-btn:hover {
            transform: translateY(-1px);
            background: var(--green-pale);
            color: var(--green);
        }

        .filter-btn.active {
            background: var(--green);
            color: #fffef8;
            box-shadow: 0 8px 20px rgba(120, 146, 96, 0.26);
        }

        .search-wrap {
            position: relative;
            min-width: min(360px, 100%);
        }

        .search-input {
            width: 100%;
            border: 1px solid rgba(166, 141, 97, 0.35);
            border-radius: 999px;
            padding: 12px 44px 12px 18px;
            color: var(--purple);
            background: rgba(255, 255, 255, 0.86);
            outline: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            border-color: rgba(120, 146, 96, 0.72);
            box-shadow: 0 0 0 4px rgba(220, 233, 189, 0.58);
        }

        .search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border: 0;
            border-radius: 50%;
            cursor: pointer;
            background: var(--cream-deep);
            color: var(--brown);
            font-size: 1.15rem;
            line-height: 1;
        }

        .search-clear:hover {
            background: var(--purple-soft);
            color: var(--purple);
        }

        .hidden {
            display: none !important;
        }

        .result-summary {
            color: #7d705c;
            font-size: 0.95rem;
            margin: 6px 0 16px;
        }

        .song-list {
            display: grid;
            gap: 12px;
            min-height: 520px;
            align-content: flex-start;
        }

        .song-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 16px 18px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(222, 208, 179, 0.74);
            background: rgba(255, 253, 247, 0.88);
            color: var(--brown);
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .song-row.has-link:hover {
            transform: translateY(-2px);
            border-color: rgba(120, 146, 96, 0.55);
            box-shadow: 0 12px 30px rgba(96, 76, 45, 0.13);
        }

        .song-main {
            min-width: 0;
        }

        .song-title-line {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .song-title {
            color: var(--purple);
            font-size: 1.08rem;
            font-weight: 900;
            line-height: 1.35;
        }

        .song-artist {
            color: #857a69;
            font-size: 0.96rem;
            font-weight: 700;
        }

        .song-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .song-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 9px;
            border-radius: 999px;
            background: var(--purple-soft);
            color: var(--purple);
            font-size: 0.8rem;
            font-weight: 900;
            line-height: 1.2;
        }

        .song-badge.status-pending {
            background: var(--green-pale);
            color: var(--green);
        }

        .song-tag-badge {
            background: #f2ead8;
            color: #7b6b53;
        }

        .song-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            min-width: 170px;
        }

        .song-link,
        .performance-link,
        .song-muted {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.86rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .song-link {
            background: var(--green);
            color: #fffef8;
        }

        .performance-link {
            background: var(--cream-deep);
            color: var(--purple);
            border: 1px solid rgba(222, 208, 179, 0.78);
        }

        .performance-link:hover {
            background: var(--green-pale);
            color: var(--green);
        }

        .song-muted {
            background: rgba(235, 226, 207, 0.62);
            color: #887d6a;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            border-radius: var(--radius-md);
            border: 1px dashed rgba(166, 141, 97, 0.45);
            background: rgba(255, 253, 247, 0.7);
            color: #7b705e;
            text-align: center;
            line-height: 1.8;
            padding: 24px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 22px;
        }

        .pagination button,
        .pagination span {
            min-width: 38px;
            height: 38px;
            border-radius: 999px;
            border: 1px solid rgba(222, 208, 179, 0.82);
            background: rgba(255, 253, 247, 0.86);
            color: var(--brown);
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
        }

        .pagination button {
            cursor: pointer;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--green-pale);
            color: var(--green);
        }

        .pagination button.active {
            background: var(--green);
            color: #fffef8;
        }

        .pagination button:disabled {
            opacity: 0.48;
            cursor: not-allowed;
        }

        .footer-note {
            margin-top: 22px;
            color: #857a69;
            text-align: center;
            line-height: 1.8;
            font-size: 0.92rem;
        }

        @media (max-width: 820px) {
            .songbook-page {
                width: min(100% - 22px, 1180px);
                padding-top: 18px;
            }

            .topbar,
            .controls,
            .hero,
            .song-row {
                grid-template-columns: 1fr;
            }

            .topbar,
            .controls {
                align-items: stretch;
            }

            .home-link {
                width: 100%;
            }

            .hero-card {
                min-height: auto;
            }

            .search-wrap {
                min-width: 100%;
            }

            .song-row {
                display: block;
            }

            .song-actions {
                justify-content: flex-start;
                min-width: 0;
                margin-top: 12px;
            }

            .song-list {
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <main class="songbook-page">
        <header class="topbar">
            <a class="brand" href="index.html" aria-label="回到恐龍諾諾博物館首頁">
                <img src="images/nono-chibi.png" alt="YanYan 小恐龍 Q 版圖">
                <h1 class="brand-title">
                    YanYan 歌聲收藏冊
                    <span class="brand-subtitle">Little Dino Songbook</span>
                </h1>
            </a>
            <a class="home-link" href="index.html">← 回到博物館</a>
        </header>

        <section class="hero" aria-labelledby="songbook-title">
            <div class="hero-copy">
                <span class="kicker">Song Archive</span>
                <h2 id="songbook-title">把唱過的歌，<br>一首一首收好。</h2>
                <p>
                    有些歌聲，是某一天的心情；有些旋律，是回頭看時還會微笑的足跡。
                    這裡把那些唱過、練習過、被記住的歌，一首一首收進小恐龍的歌聲收藏冊。
                </p>
            </div>
            <aside class="hero-card" aria-label="歌單統計">
                <span>目前收錄</span>
                <div class="count" id="songTotalCount">--</div>
                <span>首歌聲足跡 ♪</span>
            </aside>
        </section>

        <section class="songbook-panel" aria-label="歌單搜尋與列表">
            <div class="controls">
                <div class="filter-row" id="songFilterBtnContainer">
                    <button class="filter-btn active" type="button" data-filter="all">全部歌曲</button>
                    <button class="filter-btn" type="button" data-filter="中文">中文</button>
                    <button class="filter-btn" type="button" data-filter="英文">英文</button>
                    <button class="filter-btn" type="button" data-filter="日文">日文</button>
                    <button class="filter-btn" type="button" data-filter="練習中">🌱 練習中</button>
                </div>

                <div class="search-wrap">
                    <input
                        type="text"
                        id="searchSongInput"
                        class="search-input"
                        placeholder="搜尋歌名、歌手、語言或 #標籤..."
                        autocomplete="off"
                    >
                    <button class="search-clear hidden" id="songSearchClearBtn" type="button" aria-label="清除歌單搜尋">×</button>
                </div>
            </div>

            <div id="songResultSummary" class="result-summary" aria-live="polite"></div>
            <div class="song-list" id="songListContainer"></div>
            <div id="songPagination" class="pagination" aria-label="歌單分頁"></div>
        </section>

        <p class="footer-note">Rawr Rawr!!! 願每一次歌聲，都被溫柔地記得。</p>
    </main>

    <script src="data/contentMap.js"></script>
    <script src="data/vodData.js"></script>
    <script src="data/songData.js"></script>
    <script src="data.js"></script>
    <script>
        const {
            contentMap: otherContentMap = {},
            vodData = [],
            songData = []
        } = window.museumData || {};

        const contentMap = { ...otherContentMap };
        [...vodData, ...songData].forEach(item => {
            if (!item || !item.id) return;
            if (!contentMap[item.id]) {
                contentMap[item.id] = item;
            }
        });

        const songListContainer = document.getElementById('songListContainer');
        const songResultSummary = document.getElementById('songResultSummary');
        const songPagination = document.getElementById('songPagination');
        const searchSongInput = document.getElementById('searchSongInput');
        const songSearchClearBtn = document.getElementById('songSearchClearBtn');
        const songFilterBtnContainer = document.getElementById('songFilterBtnContainer');
        const songTotalCount = document.getElementById('songTotalCount');

        const SONG_SEARCH_DEBOUNCE_MS = 200;
        const SONG_ITEMS_PER_PAGE = 25;
        let currentSongFilter = 'all';
        let currentSongPage = 1;
        let songSearchTimer = null;

        songTotalCount.textContent = songData.length;

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getContent(sourceId) {
            if (!sourceId) return null;
            const content = contentMap[sourceId];
            if (!content) {
                console.warn(`songbook.html 找不到 sourceId：${sourceId}`);
                return null;
            }
            return content;
        }

        function resolveItem(item = {}) {
            return item.sourceId ? { ...getContent(item.sourceId), ...item } : item;
        }

        function getPrimaryLink(content = {}, fallback = "") {
            return content.link || content.youtube || content.xLink || fallback || "";
        }

        function normalizeSongSearchKeyword(value) {
            return String(value || "")
                .toLowerCase()
                .trim()
                .replace(/^#+/, "");
        }

        function getSongTagList(tags) {
            if (Array.isArray(tags)) {
                return tags.map(tag => String(tag || "").trim()).filter(Boolean);
            }
            return String(tags || "")
                .split(/[,，]/)
                .map(tag => tag.trim())
                .filter(Boolean);
        }

        function normalizeSongTags(tags) {
            return getSongTagList(tags).join(" ");
        }

        function getSongSearchText(song) {
            return [
                song.title,
                song.artist,
                song.singer,
                song.language,
                song.status,
                normalizeSongTags(song.tags)
            ].join(" ").toLowerCase();
        }

        function getDisplayStatus(status) {
            if (status === "待練" || status === "練習中") return "練習中";
            return status || "已收錄";
        }

        function renderSongPerformances(song, performances) {
            if (!Array.isArray(performances) || performances.length === 0) return "";

            return performances.map((performance, index) => {
                const label = performance.label || performance.date || `版本 ${index + 1}`;
                const source = getContent(performance.sourceId);
                const link = source ? getPrimaryLink(source) : "";

                if (!link) {
                    return `<span class="song-muted">${escapeHtml(label)}</span>`;
                }

                return `
                    <a class="performance-link" href="${escapeHtml(link)}" target="_blank" rel="noopener">
                        ${escapeHtml(label)} ↗
                    </a>
                `;
            }).join("");
        }

        function renderSongs(songs) {
            const html = songs.map(songItem => {
                const song = resolveItem(songItem);
                const title = song.title || "未命名歌曲";
                const artist = song.artist || song.singer || "未填歌手";
                const status = getDisplayStatus(song.status);
                const isPracticing = status === "練習中";
                const tags = getSongTagList(song.tags);
                const performances = Array.isArray(song.performances) ? song.performances : [];
                const hasPerformances = performances.length > 0;
                const link = getPrimaryLink(song);
                const rowTag = !hasPerformances && link ? "a" : "article";
                const linkAttrs = !hasPerformances && link ? `href="${escapeHtml(link)}" target="_blank" rel="noopener"` : "";
                const rowClass = `song-row ${(!hasPerformances && link) ? "has-link" : ""}`;
                const statusBadge = `<span class="song-badge ${isPracticing ? "status-pending" : ""}">${isPracticing ? "🌱 " : ""}${escapeHtml(status)}</span>`;
                const tagBadges = tags
                    .map(tag => `<span class="song-badge song-tag-badge">#${escapeHtml(tag)}</span>`)
                    .join("");
                const actionHtml = hasPerformances
                    ? renderSongPerformances(song, performances)
                    : link
                        ? `<span class="song-link">打開紀錄 ↗</span>`
                        : `<span class="song-muted">僅收錄曲目</span>`;

                return `
                    <${rowTag} ${linkAttrs} class="${rowClass}">
                        <div class="song-main">
                            <div class="song-title-line">
                                <div class="song-title">${escapeHtml(title)}</div>
                                <div class="song-artist">${escapeHtml(artist)}</div>
                            </div>
                            <div class="song-tags">
                                <span class="song-badge">${escapeHtml(song.language || "未分類")}</span>
                                ${statusBadge}
                                ${tagBadges}
                            </div>
                        </div>
                        <div class="song-actions">${actionHtml}</div>
                    </${rowTag}>
                `;
            }).join("");

            songListContainer.innerHTML = html;
        }

        function getFilteredSongData() {
            const keyword = normalizeSongSearchKeyword(searchSongInput.value);

            return songData.filter(songItem => {
                const song = resolveItem(songItem);
                const isPracticing = song.status === "待練" || song.status === "練習中";
                const matchFilter = currentSongFilter === "all"
                    || song.language === currentSongFilter
                    || (currentSongFilter === "練習中" && isPracticing);
                const matchSearch = !keyword || getSongSearchText(song).includes(keyword);

                return matchFilter && matchSearch;
            });
        }

        function getSongPageItems(totalPages) {
            if (totalPages <= 7) {
                return Array.from({ length: totalPages }, (_, index) => index + 1);
            }

            const pages = new Set([1, totalPages]);
            for (let page = currentSongPage - 2; page <= currentSongPage + 2; page += 1) {
                if (page > 1 && page < totalPages) pages.add(page);
            }

            return [...pages].sort((a, b) => a - b);
        }

        function renderSongPagination(totalPages) {
            songPagination.innerHTML = "";
            if (totalPages <= 1) return;

            const createPageButton = (label, page, options = {}) => {
                const button = document.createElement("button");
                button.type = "button";
                button.textContent = label;
                button.disabled = Boolean(options.disabled);
                button.classList.toggle("active", Boolean(options.active));
                button.addEventListener("click", () => changeSongPage(page));
                return button;
            };

            songPagination.appendChild(
                createPageButton("上一頁", currentSongPage - 1, { disabled: currentSongPage === 1 })
            );

            let previousPage = 0;
            getSongPageItems(totalPages).forEach(page => {
                if (previousPage && page - previousPage > 1) {
                    const ellipsis = document.createElement("span");
                    ellipsis.textContent = "…";
                    songPagination.appendChild(ellipsis);
                }
                songPagination.appendChild(
                    createPageButton(String(page), page, { active: page === currentSongPage })
                );
                previousPage = page;
            });

            songPagination.appendChild(
                createPageButton("下一頁", currentSongPage + 1, { disabled: currentSongPage === totalPages })
            );
        }

        function renderSongPage() {
            const filteredSongData = getFilteredSongData();
            const totalItems = filteredSongData.length;

            if (totalItems === 0) {
                songResultSummary.textContent = "沒有找到符合條件的歌曲";
                songListContainer.innerHTML = `
                    <div class="empty-state">
                        沒有找到符合條件的歌曲。<br>
                        可以試試其他關鍵字，或按右側 × 清除搜尋。
                    </div>
                `;
                songPagination.innerHTML = "";
                return;
            }

            const totalPages = Math.ceil(totalItems / SONG_ITEMS_PER_PAGE);
            currentSongPage = Math.min(Math.max(currentSongPage, 1), totalPages);
            const startIndex = (currentSongPage - 1) * SONG_ITEMS_PER_PAGE;
            const pageSongData = filteredSongData.slice(startIndex, startIndex + SONG_ITEMS_PER_PAGE);
            const hasFilter = currentSongFilter !== "all" || searchSongInput.value.trim() !== "";

            songResultSummary.textContent = `${hasFilter ? "找到" : "共"} ${totalItems} 首歌曲，目前第 ${currentSongPage} / ${totalPages} 頁`;
            renderSongs(pageSongData);
            renderSongPagination(totalPages);
        }

        function changeSongPage(page) {
            currentSongPage = page;
            renderSongPage();
        }

        function applySongFilters() {
            currentSongPage = 1;
            renderSongPage();
        }

        songFilterBtnContainer.addEventListener("click", event => {
            const button = event.target.closest("button[data-filter]");
            if (!button) return;

            currentSongFilter = button.dataset.filter || "all";
            songFilterBtnContainer.querySelectorAll(".filter-btn").forEach(btn => {
                btn.classList.toggle("active", btn === button);
            });
            applySongFilters();
        });

        searchSongInput.addEventListener("input", () => {
            songSearchClearBtn.classList.toggle("hidden", searchSongInput.value.length === 0);
            clearTimeout(songSearchTimer);
            songSearchTimer = setTimeout(applySongFilters, SONG_SEARCH_DEBOUNCE_MS);
        });

        songSearchClearBtn.addEventListener("click", () => {
            searchSongInput.value = "";
            songSearchClearBtn.classList.add("hidden");
            applySongFilters();
        });

        renderSongPage();
    </script>
</body>
</html>
